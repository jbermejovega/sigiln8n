id: SYNTHGOTHHUB_KINKSAWAKENING_PLURAL_PI_ADAPTER_V1
version: 1.0.0
kind: repository_projection_policy
status: draft_pr_gated
repository: jbermejovega/sigiln8n
role: n8n_orchestration_runtime
branch: policy/rag-mcp-n8n-compliance-v1
pull_request: 3

authority:
  canonical_repository: jbermejovega/sigilbook
  canonical_policy: docs/policy/SYNTHGOTHHUB_RAG_MCP_N8N_COMPLIANCE_V1.md
  canonical_resource: resources/rag/synthgothhub_kinksawakening_plural_pi_resource_v1.yaml
  local_code_truth: git_history
  upstream_identity_preserved: true
  connector_is_not_kernel: true

rag:
  mode: source_bound
  provenance_required: true
  immutable_ref_path_and_hash_required: true
  license_or_usage_descriptor_required: true
  retrieval_is_not_truth: true
  conflicts_remain_plural: true

mcp:
  mode: bounded_read_and_plan
  mutation: false
  repository_writes: false
  external_execution: false
  network_downloads: false

n8n:
  role: orchestration_only
  active_by_default: false
  credentials_embedded: false
  credentials_externalized: true
  retries_bounded: true
  failures_preserved: true
  trace_append_only: true
  allowed:
    - schema_validation
    - source_bound_retrieval
    - read_only_mcp_planning
    - obstruction_emission
    - human_review_handoff
  forbidden:
    - stable_diffusion_execution
    - sonic_pi_audio_playback
    - repository_write
    - merge
    - release
    - deployment

typed_sections:
  - QuasarPi
  - PluralTyped
  - QunoTypes
  - MimbrePi
  - LaurelPi
  - StableDiffusion
  - SonicPi
  - Kuirkode

aliases:
  qunos: QunoTypes
  stablediffussion: StableDiffusion
  sonicpi: SonicPi
  kuirkode: Kuirkode

invariants:
  - PIORNALEGO_ES_CANON
  - SAFE_REPLAY
  - TRACE_PRESERVED
  - PI_FIXED
  - NO_IDENTITY_TRANSPORT
  - NO_IDENTITY_COLLAPSE
  - NO_PLURAL_COLLAPSE
  - LICENSE_PRESERVED
  - HUMAN_REVIEW_REQUIRED

claim_boundary:
  policy_declared: true
  workflow_imported: false
  workflow_executed: false
  production_ready: false
  canonicalized: false
